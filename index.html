<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untukmu Selamanya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="glass-container">
        <div class="ornament ornament-left">✧<br>✧<br>✧</div>
        <div class="text-container">
            <div id="romantic-text" class="fade-text"></div>
        </div>
        <div class="ornament ornament-right">✧<br>✧<br>✧</div>
    </div>

    <div class="audio-container">
        <button id="playButton" class="play-button">
            <span class="btn-icon">▶</span>
            <span class="btn-text">Mulai Musik</span>
        </button>
        <audio id="bgMusic">
            <source src="love.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div class="music-visualizer" id="visualizer"></div>

    <script src="script.js"></script>
</body>
</html>
